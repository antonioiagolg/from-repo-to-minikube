---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-admin
rules:
  - apiGroups: [""] # Means allow access to core apiGroup
    resources: ["*"] # Allows access to all resources
    verbs: ["*"] # Allow access to all verbs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-admin
  namespace: hello-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jenkins-admin
subjects:
  - kind: ServiceAccount
    name: jenkins-admin
    namespace: hello-infra
